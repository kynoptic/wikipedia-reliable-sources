name: Markdown lint

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Lint Markdown
      run: npm run lint:md
